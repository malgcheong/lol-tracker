<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>명상</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Malgun Gothic', sans-serif; padding: 0 20px 20px; margin: 0;
         background: rgba(16, 13, 27, .68); color: #f0e6d2; height: 100vh; overflow: hidden;
         display: flex; flex-direction: column; }
  #titlebar { -webkit-app-region: drag; display: flex; justify-content: space-between; align-items: center;
              margin: 0 -20px 6px; padding: 12px 10px 8px 20px; }
  #titlebar .t { font-size: 12px; color: #c8aa6e; letter-spacing: .5px; }
  #win-close { -webkit-app-region: no-drag; width: 30px; height: 26px; border: none; border-radius: 6px;
               background: transparent; color: #a09b8c; font-size: 14px; cursor: pointer; }
  #win-close:hover { background: rgba(200, 60, 60, .75); color: #fff; }

  #stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }

  /* 호흡 원: 몽뿔이가 같이 숨쉰다 */
  #breath {
    width: 150px; height: 150px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c7b2ec, #9d7fc7 60%, #7a5fae);
    box-shadow: 0 0 40px rgba(157, 127, 199, .45);
    display: flex; align-items: center; justify-content: center;
    transform: scale(.75); transition: transform 4s ease-in-out;
  }
  #breath svg { width: 84px; height: 84px; }

  #phase-label { font-size: 19px; color: #e8dcf5; font-weight: bold; letter-spacing: 1px; min-height: 26px; }
  #sub-label { font-size: 12px; color: #a09b8c; min-height: 17px; }

  #controls { display: flex; gap: 8px; justify-content: center; padding-bottom: 4px; }
  #controls button, #done-close {
    padding: 10px 18px; font-size: 13.5px; cursor: pointer;
    background: rgba(255, 255, 255, .07); color: #f0e6d2;
    border: 1px solid rgba(200, 170, 110, .4); border-radius: 10px;
  }
  #controls button:hover, #done-close:hover { background: rgba(200, 170, 110, .25); }
</style>
</head>
<body>
  <div id="titlebar">
    <span class="t">🐉 LoL TRACKER</span>
    <button id="win-close">✕</button>
  </div>

  <div id="stage">
    <div id="breath">
      <!-- 눈 감고 명상 중인 몽뿔이 -->
      <svg viewBox="0 0 64 64">
        <ellipse cx="21" cy="10" rx="6" ry="9" fill="#f3e3bd" stroke="#6b54a0" stroke-width="2.5" transform="rotate(-18 21 10)"/>
        <ellipse cx="43" cy="10" rx="6" ry="9" fill="#f3e3bd" stroke="#6b54a0" stroke-width="2.5" transform="rotate(18 43 10)"/>
        <ellipse cx="32" cy="36" rx="24" ry="23" fill="#b9a3e0" stroke="#6b54a0" stroke-width="2.5"/>
        <path d="M20 34 q5 4 10 0 M34 34 q5 4 10 0" stroke="#241b38" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M28 45 q4 3 8 0" stroke="#241b38" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="phase-label">숨을 고르자</div>
    <div id="sub-label">시간을 고르면 시작해요</div>
  </div>

  <div id="controls">
    <button data-min="1">1분</button>
    <button data-min="3">3분</button>
    <button data-min="5">5분</button>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const breath = $('breath');
  const phaseLabel = $('phase-label');
  const subLabel = $('sub-label');

  // 들숨 4초 → 멈춤 4초 → 날숨 6초 (긴 날숨이 이완의 핵심)
  const PATTERN = [
    { name: '들이쉬어', ms: 4000, scale: 1.0 },
    { name: '잠깐 멈춰', ms: 4000, scale: 1.0 },
    { name: '천천히 내쉬어', ms: 6000, scale: 0.72 },
  ];

  let running = false;

  async function run(minutes) {
    if (running) return;
    running = true;
    $('controls').style.visibility = 'hidden';
    const endAt = Date.now() + minutes * 60 * 1000;

    while (Date.now() < endAt) {
      for (const p of PATTERN) {
        if (Date.now() >= endAt) break;
        phaseLabel.textContent = p.name;
        const remain = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
        subLabel.textContent = `${Math.floor(remain / 60)}:${String(remain % 60).padStart(2, '0')} 남음`;
        breath.style.transition = `transform ${p.ms / 1000}s ease-in-out`;
        breath.style.transform = `scale(${p.scale})`;
        await new Promise((r) => setTimeout(r, p.ms));
      }
    }

    phaseLabel.textContent = '끝! 잘했어';
    subLabel.textContent = '이 차분함, 큐보다 귀한 거야';
    breath.style.transition = 'transform 2s ease-in-out';
    breath.style.transform = 'scale(.85)';
    window.tracker.meditationDone(); // 몽뿔이가 칭찬해줌
    const btn = document.createElement('button');
    btn.id = 'done-close'; btn.textContent = '닫기';
    $('controls').innerHTML = ''; $('controls').appendChild(btn);
    $('controls').style.visibility = 'visible';
    btn.addEventListener('click', () => window.close());
    running = false;
  }

  document.querySelectorAll('#controls button').forEach((b) =>
    b.addEventListener('click', () => run(Number(b.dataset.min))));
  $('win-close').addEventListener('click', () => window.close());
</script>
</body>
</html>
