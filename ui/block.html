<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>블로커</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body { font-family: 'Malgun Gothic', sans-serif; display: flex; align-items: center; justify-content: center; }

  /* 불투명 패널: 밑의 플레이 버튼을 시각적으로도 가림 */
  #panel {
    width: 290px; background: #2a1a4d;
    border: 3px solid #f2c94c; border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    padding: 14px 16px 16px; text-align: center; color: #fff;
    animation: pop .25s ease-out;
  }
  @keyframes pop { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  #face { font-size: 34px; margin-bottom: 4px; animation: shake .4s infinite; }
  @keyframes shake { 0%,100%{transform:translateX(0) rotate(0)} 25%{transform:translateX(-3px) rotate(-4deg)} 75%{transform:translateX(3px) rotate(4deg)} }
  #msg { font-size: 14px; line-height: 1.5; margin-bottom: 12px; }
  #msg b { color: #ffd54a; }
  .btns { display: flex; flex-direction: column; gap: 7px; }
  button {
    padding: 9px; font-size: 13px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold;
  }
  #ok { background: #f2c94c; color: #2a1a4d; }
  #ok:hover { background: #ffd76b; }
  #quote { display: none; margin-top: 11px; font-size: 11.5px; font-style: italic; color: #cbbcec; line-height: 1.5; }
  #quote::before { content: '네가 적어둔 말 — '; font-style: normal; color: #8f7fb8; }
</style>
</head>
<body>
  <div id="panel">
    <div id="face">🐲</div>
    <div id="msg"></div>
    <div class="btns">
      <button id="ok">알겠어</button>
    </div>
    <div id="quote"></div>
  </div>

<script>
  const msgEl = document.getElementById('msg');

  function lineFor(v) {
    const tk = v.violations.find((x) => x.type === 'tasks');
    const ls = v.violations.find((x) => x.type === 'lossStreak');
    const dl = v.violations.find((x) => x.type === 'daily');
    if (tk) return `오늘 할 일 <b>${tk.n}개</b>가 남아 있어.<br>다 끝내면 열어줄게 — 게임은 보상이야.`;
    if (ls) return `<b>${ls.n}연패</b> 중이야. 본전 추격은 도박꾼이 다 잃는 길이야.<br>이 버튼, 내가 막고 있을게.`;
    if (dl) return `오늘 <b>${dl.n}판</b> — 약속은 ${dl.limit}판이었잖아.<br>이건 재미가 아니라 관성이야.`;
    return '여기서 멈추자. 내가 버튼 막고 있을게.';
  }

  window.tracker.onBlock((v) => {
    msgEl.innerHTML = lineFor(v);
    const q = document.getElementById('quote');
    if (v.quote) { q.textContent = `"${v.quote}"`; q.style.display = 'block'; }
    else q.style.display = 'none';
  });

  // 알겠어 = 이번 로비 세션 동안 비켜줌 (다음 세션에 다시 막음)
  document.getElementById('ok').addEventListener('click', () => window.tracker.forceThrough());
</script>
</body>
</html>
